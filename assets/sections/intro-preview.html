<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyde Media — Intro Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#141D3E;--teal:#3DBDA0;--teal2:#2EA88C;--white:#FFFFFF;--cond:'Raleway',sans-serif;}
body{font-family:var(--cond);background:#000;color:var(--white);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

.intro{
  position:relative;width:100%;height:100vh;min-height:600px;
  overflow:hidden;display:flex;align-items:flex-end;justify-content:flex-start;
}

/* Video background */
.video-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.video-bg iframe{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:177.78vh;height:100%;
  min-width:100%;min-height:56.25vw;
  border:none;
}

/* Overlay — heavier at bottom where text sits */
.video-overlay{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to bottom,
      rgba(14,21,38,0.15) 0%,
      rgba(14,21,38,0.15) 45%,
      rgba(14,21,38,0.75) 75%,
      rgba(14,21,38,0.95) 100%
    );
}

/* Top teal line */
.intro::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,transparent 0%,var(--teal) 30%,var(--teal2) 70%,transparent 100%);
}

/* Content — pinned to bottom left */
.intro-content{
  position:relative;z-index:5;
  padding:0 72px 64px;
  display:flex;flex-direction:column;align-items:flex-start;
  gap:0;
}

/* Tagline */
.intro-tagline{
  font-family:var(--cond);
  font-size:clamp(48px,7vw,100px);
  font-weight:900;
  letter-spacing:-0.01em;
  line-height:0.95;
  margin-bottom:36px;
  opacity:0;animation:fadeUp 0.9s 0.3s forwards;
}
.intro-tagline .t1{
  display:block;color:var(--white);
}
.intro-tagline .t2{
  display:block;
  color:var(--teal);
}

/* Play button — horizontal layout */
.intro-btn{
  display:inline-flex;flex-direction:row;align-items:center;gap:18px;
  text-decoration:none;
  opacity:0;animation:fadeUp 0.9s 0.55s forwards;
}
.btn-ring{
  width:64px;height:64px;border-radius:50%;
  border:1px solid rgba(61,189,160,0.55);
  background:rgba(61,189,160,0.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:background 0.3s,border-color 0.3s,transform 0.3s;
  flex-shrink:0;
}
.btn-ring::before{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(61,189,160,0.22);
  animation:pulse 2.4s ease-out infinite;
}
.btn-ring::after{
  content:'';position:absolute;inset:-20px;border-radius:50%;
  border:1px solid rgba(61,189,160,0.1);
  animation:pulse 2.4s ease-out 0.6s infinite;
}
@keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
.btn-ring svg{
  width:22px;height:22px;fill:var(--teal);
  transform:translateX(2px);
  transition:transform 0.3s;
  position:relative;z-index:1;
}
.intro-btn:hover .btn-ring{background:rgba(61,189,160,0.18);border-color:var(--teal);transform:scale(1.08);}
.intro-btn:hover .btn-ring svg{transform:translateX(4px);}

.btn-label{display:flex;flex-direction:column;gap:3px;}
.btn-label span:first-child{
  font-family:var(--cond);font-size:13px;font-weight:800;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--white);
}
.btn-label span:last-child{
  font-family:var(--cond);font-size:10px;font-weight:400;
  letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);
}
.intro-btn:hover .btn-label span:first-child{color:var(--teal);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .intro-content{padding:0 32px 48px;}
  .intro-tagline{font-size:clamp(40px,10vw,64px);}
}
</style>
</head>
<body>

<section class="intro">
  <div class="video-bg">
    <iframe
      src="https://www.youtube.com/embed/WnKNy1Zv10o?autoplay=1&mute=1&loop=1&playlist=WnKNy1Zv10o&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
  <div class="video-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-tagline">
      <span class="t1">Your Vision.</span>
      <span class="t2">Our Passion.</span>
    </h1>
    <a href="https://www.youtube.com/watch?v=WnKNy1Zv10o" target="_blank" class="intro-btn">
      <div class="btn-ring">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="btn-label">
        <span>Watch Our Reel</span>
        <span>Full screen on YouTube</span>
      </div>
    </a>
  </div>
</section>

</body>
</html>
